name = "heck-holdings"
compatibility_date = "2026-01-01"
pages_build_output_dir = "dist"

# Native Cloudflare Rate Limiting binding for /api/agent-spec.
# Strongly consistent within a colo (KV was eventually consistent → bursty
# attackers slipped through). 5 requests per 60-second window per key (IP).
# See functions/api/agent-spec.js → checkRateLimit().
[[unsafe.bindings]]
name = "RATE_LIMIT"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }
