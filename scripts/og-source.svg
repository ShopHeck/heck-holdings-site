<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="78%" cy="22%" r="60%">
      <stop offset="0%" stop-color="#e0715b" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#e0715b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#e0715b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgShade" cx="20%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#0d141a"/>
      <stop offset="100%" stop-color="#070b0f"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1a2530" fill-opacity="0.55"/>
    </pattern>
    <linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0715b" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e0715b" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e0715b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bgShade)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- top hairline -->
  <rect x="0" y="0" width="1200" height="1" fill="url(#rule)"/>

  <!-- corner brackets -->
  <g stroke="#e0715b" stroke-width="1.5" stroke-opacity="0.55" fill="none">
    <path d="M 60 60 L 60 100 M 60 60 L 100 60"/>
    <path d="M 1140 60 L 1140 100 M 1140 60 L 1100 60"/>
    <path d="M 60 570 L 60 530 M 60 570 L 100 570"/>
    <path d="M 1140 570 L 1140 530 M 1140 570 L 1100 570"/>
  </g>

  <!-- logo mark -->
  <g transform="translate(80, 80)">
    <rect x="0" y="6" width="13" height="64" rx="2" fill="#f0ddd6"/>
    <rect x="44" y="6" width="13" height="64" rx="2" fill="#f0ddd6"/>
    <circle cx="28.5" cy="38" r="7.5" fill="#e0715b"/>
    <text x="76" y="40" font-family="'Bricolage Grotesque', system-ui, sans-serif" font-size="28" font-weight="700" letter-spacing="-0.5" fill="#f0ddd6">HECK</text>
    <text x="76" y="62" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" letter-spacing="3.5" fill="#9c8d88">HOLDINGS</text>
  </g>

  <!-- live status pill -->
  <g transform="translate(1000, 92)">
    <rect x="0" y="0" width="120" height="32" rx="16" fill="none" stroke="#2a3a48" stroke-width="1"/>
    <circle cx="16" cy="16" r="4" fill="#e0715b"/>
    <text x="28" y="21" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.8" fill="#e0715b" font-weight="500">12 LIVE</text>
  </g>

  <!-- eyebrow -->
  <text x="80" y="260" font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#9c8d88" font-weight="500">
    AI AGENT CONSULTING · ST. PETE, FL · EST. 2023
  </text>

  <!-- main headline -->
  <text x="80" y="335" font-family="'Bricolage Grotesque', system-ui, sans-serif" font-weight="700" font-size="76" letter-spacing="-2.5" fill="#f0ddd6">
    Autonomous AI agents
  </text>
  <text x="80" y="415" font-family="'Bricolage Grotesque', system-ui, sans-serif" font-weight="700" font-size="76" letter-spacing="-2.5" fill="#f0ddd6">
    that ship in a month —
  </text>
  <text x="80" y="495" font-family="'Bricolage Grotesque', system-ui, sans-serif" font-weight="700" font-size="76" letter-spacing="-2.5" fill="#e0715b">
    not slide decks<tspan fill="#e0715b">.</tspan>
  </text>

  <!-- stats row -->
  <g transform="translate(80, 540)">
    <text x="0" y="0" font-family="'Bricolage Grotesque', system-ui, sans-serif" font-weight="600" font-size="28" letter-spacing="-1" fill="#f0ddd6">$1.4M+</text>
    <text x="0" y="22" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.8" fill="#9c8d88">SAVED YTD</text>

    <text x="200" y="0" font-family="'Bricolage Grotesque', system-ui, sans-serif" font-weight="600" font-size="28" letter-spacing="-1" fill="#f0ddd6">4.2 wk</text>
    <text x="200" y="22" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.8" fill="#9c8d88">AVG SHIP TIME</text>

    <text x="400" y="0" font-family="'Bricolage Grotesque', system-ui, sans-serif" font-weight="600" font-size="28" letter-spacing="-1" fill="#f0ddd6">38k+</text>
    <text x="400" y="22" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.8" fill="#9c8d88">AGENT-HOURS / MO</text>

    <text x="640" y="0" font-family="'Bricolage Grotesque', system-ui, sans-serif" font-weight="600" font-size="28" letter-spacing="-1" fill="#f0ddd6">22</text>
    <text x="640" y="22" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1.8" fill="#9c8d88">RETAINER ENGAGEMENTS</text>
  </g>

  <!-- url chip -->
  <g transform="translate(940, 540)">
    <rect x="0" y="0" width="140" height="32" rx="6" fill="#101922" stroke="#2a3a48"/>
    <text x="70" y="21" font-family="'JetBrains Mono', monospace" font-size="13" letter-spacing="1" text-anchor="middle" fill="#e0715b">heckholdings.com</text>
  </g>

  <!-- bottom hairline -->
  <rect x="0" y="629" width="1200" height="1" fill="url(#rule)"/>
</svg>
